<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Shuffle - 第34弾</title>
    <style>
        body { margin: 0; overflow: hidden; background: #e0f7fa; font-family: sans-serif; touch-action: none; }
        #ad-top, #ad-bottom { position: fixed; left: 0; width: 100%; height: 150px; background: #333; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #ad-top { top: 0; } #ad-bottom { bottom: 0; }
        iframe { border: none; width: 100%; height: 150px; }
        #main-container { margin-top: 150px; height: calc(100vh - 300px); position: relative; display: flex; flex-direction: column; align-items: center; }
        #ui { padding: 10px; font-size: 22px; font-weight: bold; color: #00838f; }
        #instruction { font-size: 28px; font-weight: bold; color: #00838f; margin-bottom: 20px; }
        #color-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; }
        .color-btn { 
            width: 90px; height: 90px; border-radius: 15px; border: none; 
            font-size: 28px; color: white; font-weight: bold; cursor: pointer; 
            box-shadow: 0 4px rgba(0,0,0,0.2); transition: transform 0.1s;
        }
        .color-btn:active { transform: scale(0.95); }
        #end-menu { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 60; 
        }
        .menu-btn { width: 220px; padding: 15px; margin: 10px; font-size: 20px; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; }
        #retry-btn { background: #00bcd4; color: white; }
        #more-games-btn { background: #ff4081; color: white; }
    </style>
</head>
<body>
    <div id="ad-top"><iframe src="ad.html"></iframe></div>
    <div id="ad-bottom"><iframe src="ad.html"></iframe></div>
    <div id="main-container">
        <div id="ui">SCORE: 0</div>
        <div id="instruction" style="color:#e91e63;"></div> <div id="color-buttons"></div>
        <div id="end-menu">
            <h2 id="result-msg">Color Shuffle</h2>
            <button id="retry-btn" class="menu-btn" onclick="startNewGame()">スタート！</button>
            <a href="https://saaaachi.github.io/Hidden-Target/" id="more-games-btn" class="menu-btn">他のゲームはこちら</a>
        </div>
    </div>
    <script>
        let score = 0, gameActive = false, timer;
        const colors = [
            {name: "あか", code: "#f44336"},
            {name: "あお", code: "#2196f3"},
            {name: "きいろ", code: "#ffeb3b"},
            {name: "みどり", code: "#4caf50"},
            {name: "むらさき", code: "#9c27b0"}
        ];
        let targetColorName; // 「あか」を探す、などの指示
        let targetColorCode; // 実際にタップすべきボタンの色

        function startNewGame() {
            document.getElementById("end-menu").style.display = "none";
            score = 0; gameActive = true;
            document.getElementById("ui").innerText = "SCORE: 0";
            nextRound();
        }

        function nextRound() {
            if(!gameActive) return;
            const buttonsContainer = document.getElementById("color-buttons");
            buttonsContainer.innerHTML = "";

            // ターゲットとなる色を決定
            const targetColorObj = colors[Math.floor(Math.random() * colors.length)];
            targetColorName = targetColorObj.name;
            targetColorCode = targetColorObj.code; // 今回は名前ではなく「色」をタップ

            // 指示を更新
            document.getElementById("instruction").innerText = `「${targetColorName}」のボタンをタップ！`;

            // ボタンをシャッフルして配置
            const shuffledColors = [...colors].sort(() => Math.random() - 0.5);
            shuffledColors.forEach(color => {
                const btn = document.createElement("button");
                btn.className = "color-btn";
                btn.style.backgroundColor = color.code;
                btn.innerText = colors[Math.floor(Math.random() * colors.length)].name; // ボタンに表示される文字はランダム
                btn.onclick = () => tapColor(color.code); // タップするのはボタンの背景色
                buttonsContainer.appendChild(btn);
            });

            clearTimeout(timer);
            // 制限時間（スコアに応じて短縮、最低1秒）
            timer = setTimeout(() => { gameOver("時間切れ！⏳"); }, Math.max(1000, 4000 - score * 100));
        }

        function tapColor(tappedCode) {
            if(!gameActive) return;
            if(tappedCode === targetColorCode) {
                score++;
                document.getElementById("ui").innerText = "SCORE: " + score;
                nextRound();
            } else {
                gameOver("違う色だよ！😱");
            }
        }

        function gameOver(msg) {
            gameActive = false;
            document.getElementById("result-msg").innerText = msg + "\nSCORE: " + score;
            document.getElementById("end-menu").style.display = "flex";
            document.getElementById("retry-btn").innerText = "もう一度遊ぶ";
        }
        window.onload = () => { document.getElementById("end-menu").style.display = "flex"; };
        setInterval(() => { const fs = document.querySelectorAll('iframe'); fs.forEach(f => { const s = f.src; f.src = "about:blank"; setTimeout(() => f.src = s, 100); }); }, 30000);
    </script>
</body>
</html>
